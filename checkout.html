<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iron Peak Fitness — complete your membership purchase securely.">
    <title>Checkout — Iron Peak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">

</head>
<body>

<nav class="navbar nopad">
    <div class="company-name">
        <i class="fa-solid fa-dumbbell company-icon" aria-hidden="true"></i>
    </div>
    <div class="nav-items"></div>
    <div class="nav-actions">
        <a href="index.html" class="contact-us" id="nav-homebtn">HOME</a>
        <button class="hamburger nopad" aria-label="Open menu">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
    </div>
</nav>

<main class="order-wrapper">

    <div class="order-summary" id="step-summary">
        <h1>ORDER SUMMARY</h1>
        <p id="plan-name"></p>
        <p id="plan-price"></p>
        <p id="plan-billing"></p>
        <button class="contact-us" id="proceed-btn" type="button">PROCEED TO PAYMENT</button>
    </div>

    <form class="order-summary hidden-step" id="step-payment" novalidate>
    <h2>PAYMENT DETAILS</h2>

    <div class="form-group">
        <label for="card-name">Cardholder name</label>
        <input type="text" id="card-name" name="cardName" placeholder="Cardholder name" autocomplete="cc-name">
    </div>

    <div class="form-group">
        <label for="card-number">Card number</label>
        <input type="tel" id="card-number" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="16" autocomplete="cc-number">
    </div>

    <div class="form-group">
        <label for="card-expiry">Expiry date</label>
        <input type="text" id="card-expiry" name="cardExpiry" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp">
    </div>

    <div class="form-group">
        <label for="card-cvv">CVV</label>
        <input type="tel" id="card-cvv" name="cardCvv" placeholder="123" maxlength="3" autocomplete="cc-csc">
    </div>

    <button class="contact-us" id="pay-btn" type="submit">PAY NOW</button>
</form>

    <div class="order-summary hidden-step" id="step-success">
        <i class="fa-solid fa-circle-check step-success-icon" aria-hidden="true"></i>
        <h2>PAYMENT SUCCESSFUL</h2>
        <p>Welcome to Iron Peak. Your membership is now active. Check your email for confirmation.</p>
        <a href="index.html" class="contact-us" id="home-btn">BACK TO HOME</a>
    </div>

</main>

<script src="JS/checkout.js"></script>
</body>
</html>
