<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Iron Peak Fitness — get in touch with our team and we'll get back to you within 24 hours.">
    <title>Iron Peak — Contact Us</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar nopad">
    <div class="company-name">
        <i class="fa-solid fa-dumbbell company-icon" aria-hidden="true"></i>
    </div>
    <div class="nav-items"></div>
    <div class="nav-actions">
        <a href="index.html" class="contact-us" id="nav-homebtn">HOME</a>
        <button class="hamburger nopad" aria-label="Open menu">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
    </div>
</nav>

<main class="form-container-wrapper">
    <div class="form-container">
        <div class="form-header">
            <h1>Contact Us</h1>
            <p>Get in touch and ask us anything.</p>
        </div>

        <form class="form-grid" id="contact-form" novalidate>

            <div class="form-contents">
                <div class="form-group">
                    <label for="contact-name">Your name</label>
                    <input
                        type="text"
                        id="contact-name"
                        name="name"
                        placeholder="Your name..."
                        autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="contact-email">Email address</label>
                    <input
                        type="email"
                        id="contact-email"
                        name="email"
                        placeholder="Email address"
                        autocomplete="email">
                </div>
            </div>

            <div class="form-contents">
                <div class="form-group">
                    <label for="contact-phone">Phone number</label>
                    <input
                        type="tel"
                        id="contact-phone"
                        name="phone"
                        placeholder="Phone number"
                        autocomplete="tel">
                </div>
                <div class="form-group">
                    <label for="contact-subject">Subject</label>
                    <input
                        type="text"
                        id="contact-subject"
                        name="subject"
                        placeholder="Subject">
                </div>
            </div>

            <div class="form-contents">
                <div class="form-group">
                    <label for="contact-message">Your message</label>
                    <textarea
                        id="contact-message"
                        name="message"
                        placeholder="Your message..."
                        rows="6"></textarea>
                </div>
            </div>

            <div class="form-contents">
                <button class="contact-us" id="submit-btn" type="submit">SEND MESSAGE</button>
            </div>

        </form>
    </div>
</main>

<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <button class="modal-close" id="modal-close">✕</button>
        <h2 id="modal-title">Thank you!</h2>
        <div id="modal-body">
            <p>Thank you for reaching out!
            We've received your message and will get back to you within 24 hours.</p>
        </div>
    </div>
</div>

<script src="JS/contact.js"></script>
</body>
</html>
